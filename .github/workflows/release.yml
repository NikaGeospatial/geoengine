name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: geoengine-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: geoengine-linux-aarch64
            cross: true

          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: geoengine-darwin-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            name: geoengine-darwin-aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: geoengine-windows-x86_64

          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            name: geoengine-windows-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          cp ${{ github.workspace }}/install/install.sh .
          tar -czvf ../../../${{ matrix.name }}.tar.gz geoengine install.sh
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Copy-Item "$env:GITHUB_WORKSPACE\install\install.ps1" .
          Compress-Archive -Path geoengine.exe,install.ps1 -DestinationPath ../../../${{ matrix.name }}.zip
          cd ../../..

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate checksums
        run: |
          # Run sha256sum inside each artifact subdirectory so the output
          # contains only the bare filename with no leading path components.
          # Explicitly match only .tar.gz and .zip to avoid hashing unexpected files.
          > checksums.txt
          for dir in artifacts/*/; do
            (
              cd "$dir"
              for f in *.tar.gz *.zip; do
                [ -f "$f" ] && sha256sum "$f"
              done
            ) >> checksums.txt
          done
          sort -k2 checksums.txt -o checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
    steps:
      - name: Get version from tag
        id: version
        run: |
          set -euo pipefail
          if ! [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Expected a semantic version tag (refs/tags/vX.Y.Z), got: $GITHUB_REF" >&2
            exit 1
          fi
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate SHA256
        id: sha
        run: |
          set -euo pipefail
          SHA256_RE='^[a-f0-9]{64}$'
          darwin_x86_64=$(shasum  -a 256 artifacts/geoengine-darwin-x86_64/geoengine-darwin-x86_64.tar.gz   | cut -d' ' -f1)
          darwin_aarch64=$(shasum -a 256 artifacts/geoengine-darwin-aarch64/geoengine-darwin-aarch64.tar.gz | cut -d' ' -f1)
          linux_x86_64=$(shasum   -a 256 artifacts/geoengine-linux-x86_64/geoengine-linux-x86_64.tar.gz     | cut -d' ' -f1)
          linux_aarch64=$(shasum  -a 256 artifacts/geoengine-linux-aarch64/geoengine-linux-aarch64.tar.gz   | cut -d' ' -f1)
          for var_name in darwin_x86_64 darwin_aarch64 linux_x86_64 linux_aarch64; do
            val="${!var_name}"
            if [[ -z "$val" ]] || ! [[ "$val" =~ $SHA256_RE ]]; then
              echo "ERROR: SHA256 for $var_name is invalid or empty: '$val'" >&2
              exit 1
            fi
          done
          echo "darwin_x86_64=$darwin_x86_64"   >> "$GITHUB_OUTPUT"
          echo "darwin_aarch64=$darwin_aarch64" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$linux_x86_64"     >> "$GITHUB_OUTPUT"
          echo "linux_aarch64=$linux_aarch64"   >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: NikaGeospatial/homebrew-geoengine
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-geoengine

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DARWIN_X86_64: ${{ steps.sha.outputs.darwin_x86_64 }}
          DARWIN_AARCH64: ${{ steps.sha.outputs.darwin_aarch64 }}
          LINUX_X86_64: ${{ steps.sha.outputs.linux_x86_64 }}
          LINUX_AARCH64: ${{ steps.sha.outputs.linux_aarch64 }}
        run: |
          set -euo pipefail
          FORMULA="homebrew-geoengine/Formula/geoengine.rb"

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$FORMULA"
          grep -q "version \"${VERSION}\"" "$FORMULA" || { echo "ERROR: version replacement failed in formula" >&2; exit 1; }

          # Update SHA256 values: match the URL line then replace sha256 on the next line
          sed -i "/geoengine-darwin-x86_64\.tar\.gz/,/sha256/{s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${DARWIN_X86_64}\"/;}" "$FORMULA"
          grep -q "sha256 \"${DARWIN_X86_64}\"" "$FORMULA" || { echo "ERROR: SHA256 replacement failed for darwin-x86_64" >&2; exit 1; }
          sed -i "/geoengine-darwin-aarch64\.tar\.gz/,/sha256/{s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${DARWIN_AARCH64}\"/;}" "$FORMULA"
          grep -q "sha256 \"${DARWIN_AARCH64}\"" "$FORMULA" || { echo "ERROR: SHA256 replacement failed for darwin-aarch64" >&2; exit 1; }
          sed -i "/geoengine-linux-x86_64\.tar\.gz/,/sha256/{s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${LINUX_X86_64}\"/;}" "$FORMULA"
          grep -q "sha256 \"${LINUX_X86_64}\"" "$FORMULA" || { echo "ERROR: SHA256 replacement failed for linux-x86_64" >&2; exit 1; }
          sed -i "/geoengine-linux-aarch64\.tar\.gz/,/sha256/{s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${LINUX_AARCH64}\"/;}" "$FORMULA"
          grep -q "sha256 \"${LINUX_AARCH64}\"" "$FORMULA" || { echo "ERROR: SHA256 replacement failed for linux-aarch64" >&2; exit 1; }

      - name: Commit and push
        run: |
          cd homebrew-geoengine
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/geoengine.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "geoengine ${{ steps.version.outputs.version }}"
          git push
