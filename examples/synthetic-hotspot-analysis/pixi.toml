[workspace]
name = "synthetic-hotspot-analysis"
version = "0.1.0"
description = "A geoengine project"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
pip = "*"
fiona = ">=1.9,<2"
shapely = ">=2.0,<3"
python = ">=3.11,<3.13"
numpy = ">=1.26,<3"
geopandas = ">=0.14,<1"
scipy = ">=1.11,<2"
pandas = ">=2.1,<3"
xarray = "*"
pyproj = ">=3.6,<4"
gdal = ">=3.9.0,<4"
zarr = "*"

[pypi-dependencies]
argparse = "*"
