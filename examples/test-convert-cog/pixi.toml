[workspace]
name = "test-convert-cog"
version = "0.1.0"
description = "A geoengine project"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
python = ">=3.11,<3.13"
gdal = ">=3.9.0,<4"
pip = "*"
pyproj = ">=3.6,<4"
fiona = ">=1.9,<2"
numpy = ">=1.26,<3"
shapely = ">=2.0,<3"
pandas = ">=2.1,<3"
xarray = "*"
geopandas = ">=0.14,<1"
zarr = "*"
scipy = ">=1.11,<2"

[pypi-dependencies]
argparse = "*"
