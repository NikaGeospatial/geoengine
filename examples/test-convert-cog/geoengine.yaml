name: test-convert-cog
version: "1.0.0"
description: Convert a GeoTIFF to a Cloud-Optimized GeoTIFF (COG) using GDAL.

command:
  program: python
  script: main.py
  inputs:
    - name: input-path
      type: file
      required: true
      description: Path to the input GeoTIFF file
      readonly: true
      filetypes:
        - .tif
        - .tiff
    - name: output-path
      type: file
      required: true
      description: Path for the output COG file
      readonly: false
      filetypes:
        - .tif
        - .tiff

plugins:
  arcgis: false
  qgis: true

deploy:
  tenant_id: null
